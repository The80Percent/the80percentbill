# Explicit build config for Railway (Nixpacks)
[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "/bin/sh -c 'python manage.py migrate --noinput && python manage.py collectstatic --noinput && python -m gunicorn the_80_percent_bill.wsgi --bind 0.0.0.0:${PORT:-8000}'"
